schema_version = 5
current_migration_owner = "prisma"
target_migration_owner = "alembic"
cutover_status = "ready"
ownership_granularity = "table_and_enum"
child_object_policy = "indexes_constraints_and_foreign_keys_inherit_table_owner"
excluded_database_objects = ["_prisma_migrations", "alembic_version"]

[defaults]
current_owner = "prisma"
target_owner = "alembic"
cutover_status = "prisma_owned"

[objects.tables]
users = ["User"]
accounts = ["Account", "AccountMember", "AccountInvite"]
transactions = ["Transaction", "TransactionPair", "TransactionSplit"]
counterparties = ["Counterparty", "CounterpartyAlias"]
categories = ["Category", "CategoryRule"]
budgets = ["Budget", "BudgetItem", "BudgetItemCategory", "BudgetAccount", "BudgetAlert"]
assets = ["Asset", "AssetListing", "AssetAlias"]
prices_fx = ["PriceSnapshot", "ExchangeRate"]
ledger = ["InvestmentEvent", "InvestmentMovement"]
holdings = ["Holding"]
imports = ["ImportBatch", "ImportRow", "ImportLog"]
snapshots = ["NetWorthSnapshot", "AccountSnapshot", "AccountSnapshotItem"]

[objects.enums]
accounts = ["AccountMemberRole", "AccountRelationType", "AccountInviteStatus", "AccountType"]
transactions = ["TransactionType", "TransactionClassification"]
counterparties = ["CounterpartyType", "AliasMatchType"]
categories = ["CategoryType", "RuleField", "RuleOperator"]
budgets = ["BudgetPeriodType", "BudgetAlertType"]
assets = ["AssetAliasProvider", "AssetType"]
prices_fx = ["PriceSource", "ExchangeRateSource"]
ledger = ["InvestmentEventType", "InvestmentMovementKind", "MovementDirection"]
imports = ["ImportSource", "ImportStatus", "ImportRowStatus", "ImportLogLevel", "ImportLogEvent"]
snapshots = ["SnapshotGranularity", "SnapshotSource"]

[python_usage]
read_tables = ["Account", "AccountMember", "Holding", "ExchangeRate"]
read_enums = []
transitive_read_tables = ["User", "Asset", "AssetListing"]
transitive_read_enums = ["AccountMemberRole", "AccountRelationType", "AccountType", "PriceSource", "AssetType", "ExchangeRateSource"]

[sqlalchemy_mirror]
state = "mirrored_in_sqlalchemy"
coverage = "complete"
tables = [
  "User",
  "Account",
  "AccountMember",
  "AccountInvite",
  "Transaction",
  "TransactionPair",
  "TransactionSplit",
  "Counterparty",
  "CounterpartyAlias",
  "Category",
  "CategoryRule",
  "Budget",
  "BudgetItem",
  "BudgetItemCategory",
  "BudgetAccount",
  "BudgetAlert",
  "Asset",
  "AssetListing",
  "AssetAlias",
  "PriceSnapshot",
  "ExchangeRate",
  "InvestmentEvent",
  "InvestmentMovement",
  "Holding",
  "ImportBatch",
  "ImportRow",
  "ImportLog",
  "NetWorthSnapshot",
  "AccountSnapshot",
  "AccountSnapshotItem",
]
enums = [
  "AccountMemberRole",
  "AccountRelationType",
  "AccountInviteStatus",
  "AccountType",
  "TransactionType",
  "TransactionClassification",
  "CounterpartyType",
  "AliasMatchType",
  "CategoryType",
  "RuleField",
  "RuleOperator",
  "BudgetPeriodType",
  "BudgetAlertType",
  "AssetAliasProvider",
  "AssetType",
  "PriceSource",
  "ExchangeRateSource",
  "InvestmentEventType",
  "InvestmentMovementKind",
  "MovementDirection",
  "ImportSource",
  "ImportStatus",
  "ImportRowStatus",
  "ImportLogLevel",
  "ImportLogEvent",
  "SnapshotGranularity",
  "SnapshotSource",
]

[sqlalchemy_parity]
columns = true
primary_keys = true
foreign_keys = true
unique_constraints = true
indexes = true
server_defaults = true
enum_values = true
verified_against = "prisma_migrated_postgresql_16"

[alembic_baseline]
state = "verified_not_owner"
revision = "3d0001base"
revision_count = 1
head_count = 1
upgrade_is_noop = true
downgrade_supported = false
version_table = "alembic_version"
version_table_schema = "public"
requires_schema_verification_before_stamp = true
source = "canonical_postgresql_baseline"

[alembic_baseline.verification]
clean_prisma_database = true
existing_database_copy = true
canonical_sql_bootstrap = true
sqlalchemy_parity = true
data_preservation = true
alembic_check = true

[cutover]
phase = "prepared"
baseline_revision = "3d0001base"
all_target_databases_must_be_stamped = true
production_activation_allowed = false
receipts_required_before_activation = true

[prisma_migrations]
state = "frozen_archive"
creation_enabled = false
deployment_enabled = false
legacy_archive_verification_enabled = true
archive_manifest = "database/prisma_migration_archive.toml"
archive_sha256 = "beac94880bdd44822530a39f120d2ea44b0414e04a76eeccf9bb5b8d35233cee"

[prisma_runtime]
state = "compatibility_mirror"
client_enabled = true
schema_is_migration_source = false

[cutover_evidence]
receipt_template = "database/cutover/receipt.template.toml"
receipts_required_before_activation = true
secrets_allowed = false
