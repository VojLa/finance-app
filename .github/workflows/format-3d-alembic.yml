name: Format Final 3D Alembic

on:
  push:
    branches:
      - build/alembic-baseline-readiness
    paths:
      - ".github/workflows/format-3d-alembic.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: backend/python/.python-version
      - uses: astral-sh/setup-uv@v6
      - working-directory: backend/python
        run: uv sync --frozen --extra dev
      - working-directory: backend/python
        run: uv run ruff format .
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/python
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style(db): apply final Ruff formatting"
          git push
