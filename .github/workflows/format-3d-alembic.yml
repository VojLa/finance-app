name: Format 3D Alembic

on:
  push:
    branches:
      - build/alembic-baseline-readiness
    paths:
      - ".github/workflows/format-3d-alembic.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: backend/python/.python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        working-directory: backend/python
        run: uv sync --frozen --extra dev

      - name: Format Python files
        working-directory: backend/python
        run: uv run ruff format .

      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/python
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style(db): format Alembic baseline code"
          git push
