name: Fix 3C Python Style

on:
  push:
    branches:
      - build/sqlalchemy-schema-parity
    paths:
      - ".github/workflows/fix-3c-style.yml"

permissions:
  contents: write

jobs:
  fix:
    name: Apply Ruff fixes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/python

    steps:
      - name: Check out branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: backend/python/.python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Apply Ruff fixes and formatting
        run: |
          uv run ruff check . --fix --unsafe-fixes || true
          uv run ruff format .
          uv run ruff check . > ../../.ruff-3c-report.txt || true

      - name: Commit fixes and report
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/python .ruff-3c-report.txt
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style(db): apply Ruff formatting"
          git push
