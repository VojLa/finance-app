name: Implement 3F

on:
  push:
    branches:
      - feat/alembic-account-notes
    paths:
      - ".github/workflows/implement-3f.yml"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/implement-3f.yml"
      - "backend/python/scripts/implement_3f_temp.py"

permissions:
  contents: write

jobs:
  implement-and-verify:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finance_app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d finance_app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finance_app
      PGPASSWORD: postgres
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: actions/setup-python@v5
        with:
          python-version-file: backend/python/.python-version

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: backend/python/uv.lock

      - name: Install Python dependencies
        working-directory: backend/python
        run: uv sync --frozen --extra dev

      - name: Install PostgreSQL 16 client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client-16

      - name: Apply Step 3F source changes
        working-directory: backend/python
        run: uv run python scripts/implement_3f_temp.py

      - name: Format Python and Prisma sources
        run: |
          cd backend/python
          uv run ruff format .
          cd ../..
          npx prisma format
          npx prettier --write .github/workflows/database-schema.yml

      - name: Load inherited baseline and generate current-head schema artifact
        working-directory: backend/python
        run: |
          python - <<'PY'
          from pathlib import Path
          source = Path('database/baseline/schema.sql').read_text(encoding='utf-8')
          Path('.bootstrap-3f.sql').write_text(
              source.replace('CREATE SCHEMA "public";\n', '', 1),
              encoding='utf-8',
              newline='\n',
          )
          PY
          psql --set=ON_ERROR_STOP=1 --dbname="$DATABASE_URL" --file=.bootstrap-3f.sql
          rm .bootstrap-3f.sql
          uv run alembic -c alembic.ini stamp 3d0001base
          uv run alembic -c alembic.ini upgrade head
          uv run python scripts/database_schema.py --write --revision 3f0001acctnote
          uv run python scripts/database_schema.py --check --revision 3f0001acctnote
          uv run python scripts/sqlalchemy_schema.py --check
          uv run alembic -c alembic.ini check

      - name: Reset database to frozen Prisma history
        run: |
          dropdb --host localhost --username postgres --force finance_app
          createdb --host localhost --username postgres finance_app
          ALLOW_FROZEN_PRISMA_ARCHIVE_DEPLOY=1 npm run db:prisma:archive:verify

      - name: Verify static quality and migration policy
        working-directory: backend/python
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy app scripts tests
          uv run python scripts/migration_policy.py --check
          uv run pytest \
            tests/test_database_schema.py \
            tests/test_database_models.py \
            tests/test_database_url.py \
            tests/test_sqlalchemy_schema.py \
            tests/test_alembic_configuration.py \
            tests/test_alembic_baseline.py \
            tests/test_migration_policy.py \
            tests/test_database_migrate.py

      - name: Verify inherited database migration lifecycle
        working-directory: backend/python
        run: |
          uv run python scripts/database_schema.py --check --revision 3d0001base
          uv run python scripts/alembic_baseline.py --verify
          uv run pytest tests/test_alembic_integration.py -v
          uv run pytest \
            tests/test_sqlalchemy_schema_parity.py \
            tests/test_sqlalchemy_persistence.py \
            tests/test_database_migrate_integration.py \
            -v
          uv run python scripts/database_migrate.py check
          uv run python scripts/database_schema.py --check --revision 3f0001acctnote
          uv run python scripts/sqlalchemy_schema.py --check
          uv run alembic -c alembic.ini current --check-heads
          uv run alembic -c alembic.ini check

      - name: Verify clean bootstrap
        working-directory: backend/python
        env:
          BOOTSTRAP_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finance_app_bootstrap
        run: |
          createdb --host localhost --username postgres finance_app_bootstrap
          export DATABASE_URL="$BOOTSTRAP_DATABASE_URL"
          uv run python scripts/database_migrate.py bootstrap
          uv run python scripts/database_migrate.py check
          uv run python scripts/database_schema.py --check --revision 3f0001acctnote
          uv run python scripts/sqlalchemy_schema.py --check

      - name: Verify Prisma and frontend compatibility
        run: |
          npm run db:prisma:validate
          npm run db:prisma:generate
          npm test
          npm run lint

      - name: Remove implementation helpers and commit verified result
        run: |
          rm backend/python/scripts/implement_3f_temp.py
          rm .github/workflows/implement-3f.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --check
          git commit -m "feat(db): add first Alembic-owned schema migration"
          git push
