name: Diagnose 3F formatting

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/implement-3f.yml"

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/alembic-account-notes

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: actions/setup-python@v5
        with:
          python-version-file: backend/python/.python-version

      - uses: astral-sh/setup-uv@v6

      - name: Install Python dependencies
        working-directory: backend/python
        run: uv sync --frozen --extra dev

      - name: Apply source patch and capture format output
        shell: bash
        run: |
          set +e
          cd backend/python
          uv run python scripts/fix_implement_3f_temp.py > /tmp/3f-report.txt 2>&1
          echo "fix_status=$?" >> /tmp/3f-report.txt
          uv run python scripts/implement_3f_temp.py >> /tmp/3f-report.txt 2>&1
          echo "patch_status=$?" >> /tmp/3f-report.txt
          uv run ruff format . >> /tmp/3f-report.txt 2>&1
          echo "ruff_format_status=$?" >> /tmp/3f-report.txt
          cd ../..
          npx prisma format >> /tmp/3f-report.txt 2>&1
          echo "prisma_format_status=$?" >> /tmp/3f-report.txt
          npx prettier --write .github/workflows/database-schema.yml >> /tmp/3f-report.txt 2>&1
          echo "prettier_status=$?" >> /tmp/3f-report.txt
          git reset --hard HEAD
          rm .github/workflows/implement-3f.yml
          cp /tmp/3f-report.txt backend/python/3f-format-report.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/implement-3f.yml backend/python/3f-format-report.txt
          git commit -m "chore: capture 3F formatting diagnostic"
          git push origin HEAD:feat/alembic-account-notes
