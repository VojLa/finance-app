name: Diagnose 3F

on:
  pull_request:
    branches: [main]
    paths: [".github/workflows/implement-3f.yml"]

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finance_app
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d finance_app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finance_app
      PGPASSWORD: postgres
      CI: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/alembic-account-notes
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/setup-python@v5
        with:
          python-version-file: backend/python/.python-version
      - uses: astral-sh/setup-uv@v6
      - working-directory: backend/python
        run: uv sync --frozen --extra dev
      - run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client-16
      - shell: bash
        run: |
          set +e
          DISABLE_FAILURE_TRACE=1 bash -x backend/python/scripts/run_3f_temp.sh > /tmp/report.txt 2>&1
          echo "exit_status=$?" >> /tmp/report.txt
          git reset --hard HEAD
          cp /tmp/report.txt backend/python/3f-lifecycle-report.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/python/3f-lifecycle-report.txt
          git commit -m "chore: record isolated 3F diagnostics"
          git push origin HEAD:feat/alembic-account-notes
