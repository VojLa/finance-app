name: Generate 3E-A Prisma Archive

on:
  pull_request:
    paths:
      - "prisma/migrations/**"
      - "backend/python/scripts/migration_policy.py"
      - "backend/python/database/schema_ownership.toml"
      - ".github/workflows/generate-3e-a-archive.yml"

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out pull request
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: backend/python/.python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install backend dependencies
        working-directory: backend/python
        run: uv sync --frozen --extra dev

      - name: Generate frozen Prisma archive manifest
        working-directory: backend/python
        run: uv run python scripts/migration_policy.py --write-archive-manifest

      - name: Upload generated archive metadata
        uses: actions/upload-artifact@v4
        with:
          name: prisma-migration-archive
          path: |
            backend/python/database/prisma_migration_archive.toml
            backend/python/database/schema_ownership.toml
          if-no-files-found: error
