name: Diagnose 3E-B

on:
  push:
    branches:
      - build/alembic-ownership-cutover
    paths:
      - ".github/workflows/diagnose-3e-b.yml"

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finance_app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d finance_app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finance_app
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/setup-python@v5
        with:
          python-version-file: backend/python/.python-version
      - uses: astral-sh/setup-uv@v6
      - name: Install backend dependencies
        working-directory: backend/python
        run: uv sync --frozen --extra dev
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client-16
      - name: Apply frozen archive
        env:
          CI: "true"
          ALLOW_FROZEN_PRISMA_ARCHIVE_DEPLOY: "1"
        run: npm run db:prisma:archive:verify
      - name: Capture integration test
        working-directory: backend/python
        shell: bash
        run: |
          set +e
          uv run pytest tests/test_alembic_integration.py -vv > 3e-b-integration-report.txt 2>&1
          echo "exit_code=$?" >> 3e-b-integration-report.txt
          exit 0
      - name: Commit diagnostic report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/python/3e-b-integration-report.txt
          git commit -m "chore: capture 3E-B integration diagnostic"
          git push
