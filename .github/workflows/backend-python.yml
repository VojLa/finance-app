name: Backend Python

on:
  pull_request:
    paths:
      - "backend/python/**"
      - ".github/workflows/backend-python.yml"
  push:
    branches:
      - main
    paths:
      - "backend/python/**"
      - ".github/workflows/backend-python.yml"

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/python

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: backend/python/.python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: backend/python/uv.lock

      - name: Install backend dependencies
        run: uv sync --frozen --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy app tests

      - name: Pytest
        run: uv run pytest --cov=app --cov-report=term-missing
