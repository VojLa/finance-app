name: Backend Python

on:
  pull_request:
    paths:
      - "backend/python/**"
      - ".github/workflows/backend-python.yml"
  push:
    branches:
      - main
    paths:
      - "backend/python/**"
      - ".github/workflows/backend-python.yml"

permissions:
  contents: write

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/python

    steps:
      - name: Check out repository branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: backend/python/.python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: backend/python/pyproject.toml

      - name: Install backend dependencies
        run: uv sync --extra dev

      - name: Commit generated lockfile
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add uv.lock
          if ! git diff --cached --quiet; then
            git commit -m "build(backend): lock Python dependencies"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy app tests

      - name: Pytest
        run: uv run pytest --cov=app --cov-report=term-missing
