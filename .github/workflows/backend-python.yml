name: Backend Python

on:
  pull_request:
    paths:
      - "backend/python/**"
      - ".github/workflows/backend-python.yml"
  push:
    branches:
      - main
    paths:
      - "backend/python/**"
      - ".github/workflows/backend-python.yml"

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/python

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: backend/python/.python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: backend/python/pyproject.toml

      - name: Install backend dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Mypy
        shell: bash
        run: |
          set +e
          uv run mypy app tests --no-color-output > mypy-results.txt 2>&1
          status=$?
          cat mypy-results.txt
          exit $status

      - name: Upload mypy report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-results
          path: backend/python/mypy-results.txt
          if-no-files-found: error

      - name: Pytest
        run: uv run pytest --cov=app --cov-report=term-missing
