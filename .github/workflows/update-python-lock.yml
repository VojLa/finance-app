name: Refresh Python Lock

on:
  push:
    branches:
      - build/sqlalchemy-persistence-foundation
    paths:
      - "backend/python/pyproject.toml"
      - ".github/workflows/update-python-lock.yml"

permissions:
  contents: write

jobs:
  lock:
    name: Regenerate uv.lock
    runs-on: ubuntu-latest

    steps:
      - name: Check out branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: backend/python/.python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Refresh dependency lock
        working-directory: backend/python
        run: uv lock

      - name: Commit dependency lock
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/python/uv.lock
          if git diff --cached --quiet; then
            echo "uv.lock is already current."
            exit 0
          fi
          git commit -m "build(backend): refresh dependency lock"
          git push
