name: Database Schema

on:
  pull_request:
    paths:
      - "prisma/**"
      - "package.json"
      - "package-lock.json"
      - "scripts/prisma-migrations-frozen.mjs"
      - "scripts/prisma-archive-verify.mjs"
      - "backend/python/alembic.ini"
      - "backend/python/migrations/**"
      - "backend/python/app/db/**"
      - "backend/python/app/lifespan.py"
      - "backend/python/app/modules/portfolio/**"
      - "backend/python/database/**"
      - "backend/python/pyproject.toml"
      - "backend/python/scripts/alembic_baseline.py"
      - "backend/python/scripts/database_migrate.py"
      - "backend/python/scripts/database_schema.py"
      - "backend/python/scripts/migration_policy.py"
      - "backend/python/scripts/sqlalchemy_schema.py"
      - "backend/python/tests/test_alembic_configuration.py"
      - "backend/python/tests/test_alembic_baseline.py"
      - "backend/python/tests/test_alembic_integration.py"
      - "backend/python/tests/test_database_migrate.py"
      - "backend/python/tests/test_database_migrate_integration.py"
      - "backend/python/tests/test_database_models.py"
      - "backend/python/tests/test_database_schema.py"
      - "backend/python/tests/test_database_url.py"
      - "backend/python/tests/test_migration_policy.py"
      - "backend/python/tests/test_sqlalchemy_persistence.py"
      - "backend/python/tests/test_sqlalchemy_schema.py"
      - "backend/python/tests/test_sqlalchemy_schema_parity.py"
      - "backend/python/uv.lock"
      - ".github/workflows/database-schema.yml"
  push:
    branches:
      - main
    paths:
      - "prisma/**"
      - "package.json"
      - "package-lock.json"
      - "scripts/prisma-migrations-frozen.mjs"
      - "scripts/prisma-archive-verify.mjs"
      - "backend/python/alembic.ini"
      - "backend/python/migrations/**"
      - "backend/python/app/db/**"
      - "backend/python/app/lifespan.py"
      - "backend/python/app/modules/portfolio/**"
      - "backend/python/database/**"
      - "backend/python/pyproject.toml"
      - "backend/python/scripts/alembic_baseline.py"
      - "backend/python/scripts/database_migrate.py"
      - "backend/python/scripts/database_schema.py"
      - "backend/python/scripts/migration_policy.py"
      - "backend/python/scripts/sqlalchemy_schema.py"
      - "backend/python/tests/test_alembic_configuration.py"
      - "backend/python/tests/test_alembic_baseline.py"
      - "backend/python/tests/test_alembic_integration.py"
      - "backend/python/tests/test_database_migrate.py"
      - "backend/python/tests/test_database_migrate_integration.py"
      - "backend/python/tests/test_database_models.py"
      - "backend/python/tests/test_database_schema.py"
      - "backend/python/tests/test_database_url.py"
      - "backend/python/tests/test_migration_policy.py"
      - "backend/python/tests/test_sqlalchemy_persistence.py"
      - "backend/python/tests/test_sqlalchemy_schema.py"
      - "backend/python/tests/test_sqlalchemy_schema_parity.py"
      - "backend/python/uv.lock"
      - ".github/workflows/database-schema.yml"

permissions:
  contents: read

jobs:
  verify-schema:
    name: Verify Alembic ownership cutover
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finance_app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d finance_app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finance_app
      PGPASSWORD: postgres

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: backend/python/.python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: backend/python/uv.lock

      - name: Install backend dependencies
        working-directory: backend/python
        run: uv sync --frozen --extra dev

      - name: Install PostgreSQL 16 client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client-16

      - name: Apply frozen Prisma archive for historical verification
        env:
          ALLOW_FROZEN_PRISMA_ARCHIVE_DEPLOY: "1"
        run: npm run db:prisma:archive:verify

      - name: Verify Prisma runtime compatibility tooling
        run: |
          npm run db:prisma:validate
          npm run db:prisma:generate

      - name: Enforce frozen Prisma archive and completed Alembic ownership policy
        working-directory: backend/python
        run: uv run python scripts/migration_policy.py --check

      - name: Verify canonical schema baseline before metadata checks
        working-directory: backend/python
        run: uv run python scripts/database_schema.py --check

      - name: Validate ownership, SQLAlchemy metadata, Alembic graph, and migration policy
        working-directory: backend/python
        run: >-
          uv run pytest
          tests/test_database_schema.py
          tests/test_database_models.py
          tests/test_database_url.py
          tests/test_sqlalchemy_schema.py
          tests/test_alembic_configuration.py
          tests/test_alembic_baseline.py
          tests/test_migration_policy.py
          tests/test_database_migrate.py

      - name: Compare SQLAlchemy metadata with migrated PostgreSQL
        working-directory: backend/python
        run: uv run python scripts/sqlalchemy_schema.py --check

      - name: Verify inherited database across the cutover boundary
        working-directory: backend/python
        run: uv run python scripts/alembic_baseline.py --verify

      - name: Run persistence, parity, and Alembic cutover integration tests
        working-directory: backend/python
        run: >-
          uv run pytest
          tests/test_sqlalchemy_schema_parity.py
          tests/test_sqlalchemy_persistence.py
          tests/test_alembic_integration.py
          -v

      - name: Verify Alembic-owned migration runner and advisory lock
        working-directory: backend/python
        run: |
          uv run pytest tests/test_database_migrate_integration.py -v
          uv run python scripts/database_migrate.py check
          uv run python scripts/database_migrate.py upgrade

      - name: Verify database is at the Alembic ownership head
        working-directory: backend/python
        run: |
          uv run alembic -c alembic.ini current --check-heads
          uv run alembic -c alembic.ini check
          uv run alembic -c alembic.ini upgrade head
          uv run python scripts/alembic_baseline.py --verify

      - name: Verify canonical baseline after Alembic checks
        working-directory: backend/python
        run: |
          uv run python scripts/database_schema.py --check
          uv run python scripts/sqlalchemy_schema.py --check

      - name: Verify Prisma-free canonical bootstrap to cutover head
        working-directory: backend/python
        env:
          BOOTSTRAP_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finance_app_canonical_bootstrap
        run: |
          createdb --host localhost --username postgres finance_app_canonical_bootstrap
          export DATABASE_URL="$BOOTSTRAP_DATABASE_URL"
          uv run python scripts/database_migrate.py bootstrap
          uv run python scripts/database_migrate.py check
          uv run python scripts/database_schema.py --check
          uv run python scripts/sqlalchemy_schema.py --check
