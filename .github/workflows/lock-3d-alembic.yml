name: Refresh 3D Alembic Lock

on:
  push:
    branches:
      - build/alembic-baseline-readiness
    paths:
      - ".github/workflows/lock-3d-alembic.yml"

permissions:
  contents: write

jobs:
  lock:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: backend/python/.python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Refresh lock file
        working-directory: backend/python
        run: uv lock

      - name: Commit lock file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/python/uv.lock
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "build(backend): lock Alembic dependency"
          git push
