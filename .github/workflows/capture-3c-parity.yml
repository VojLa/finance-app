name: Capture 3C Schema Parity

on:
  push:
    branches:
      - build/sqlalchemy-schema-parity
    paths:
      - ".github/workflows/capture-3c-parity.yml"

permissions:
  contents: write

jobs:
  report:
    name: Capture metadata parity diff
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finance_app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d finance_app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finance_app

    steps:
      - name: Check out branch
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Apply Prisma migrations
        run: npm run db:deploy

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: backend/python/.python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install backend dependencies
        working-directory: backend/python
        run: uv sync --frozen --extra dev

      - name: Capture parity diff
        working-directory: backend/python
        run: >-
          uv run python scripts/sqlalchemy_schema.py --check
          > ../../.parity-3c-report.txt 2>&1 || true

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .parity-3c-report.txt
          git commit -m "ci(db): capture 3C parity report"
          git pull --rebase origin build/sqlalchemy-schema-parity
          git push

# rerun after unique and foreign-key normalization
