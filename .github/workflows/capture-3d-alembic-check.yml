name: Capture Final 3D Alembic Check

on:
  push:
    branches:
      - build/alembic-baseline-readiness
    paths:
      - ".github/workflows/capture-3d-alembic-check.yml"

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finance_app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d finance_app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finance_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:deploy
      - uses: actions/setup-python@v5
        with:
          python-version-file: backend/python/.python-version
      - uses: astral-sh/setup-uv@v6
      - working-directory: backend/python
        run: uv sync --frozen --extra dev
      - working-directory: backend/python
        run: |
          uv run alembic -c alembic.ini stamp 3d0001base
          uv run alembic -c alembic.ini check > ../../.alembic-check-3d-report.txt 2>&1 || true
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .alembic-check-3d-report.txt
          git commit -m "ci(db): capture final Alembic drift"
          git pull --rebase origin build/alembic-baseline-readiness
          git push
